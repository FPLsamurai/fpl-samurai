# GitHubにプッシュすると、自動で public/ フォルダを GitHub Pages に公開します。
# （初回だけ GitHub の設定で Pages の Source を「GitHub Actions」にしてください。手順は README.md）

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # GitHubの画面から手動でも実行できるように

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: ソースを取得
        uses: actions/checkout@v4

      - name: Pages の設定
        uses: actions/configure-pages@v5

      - name: 公開フォルダ(public)をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: 公開
        id: deployment
        uses: actions/deploy-pages@v4
